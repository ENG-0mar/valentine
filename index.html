
<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jojo's Valentine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose-50: #fff1f2;
            --rose-100: #ffe4e6;
            --rose-200: #fecdd3;
            --rose-500: #f43f5e;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fffafb;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .font-cursive {
            font-family: 'Dancing Script', cursive;
        }
        .font-arabic-romance {
            font-family: 'Amiri', serif;
        }
        
        /* Premium Mesh Gradient Background */
        .mesh-gradient {
            background-color: #fffafb;
            background-image: 
                radial-gradient(at 0% 0%, hsla(353,100%,96%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(340,100%,95%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(330,100%,96%,1) 0, transparent 50%), 
                radial-gradient(at 50% 50%, hsla(350,100%,98%,1) 0, transparent 50%), 
                radial-gradient(at 0% 100%, hsla(355,100%,96%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(345,100%,96%,1) 0, transparent 50%);
            background-attachment: fixed;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(255, 182, 193, 0.2);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Animated Blob Background */
        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,192,203,0.3) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
            animation: move 25s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(20%, 20%) scale(1.2); }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "framer-motion": "https://esm.sh/framer-motion@^11.11.11"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="mesh-gradient min-h-screen">
    <div class="blob" style="top: -10%; left: -10%;"></div>
    <div class="blob" style="bottom: -10%; right: -10%; animation-delay: -5s; background: radial-gradient(circle, rgba(255,228,225,0.4) 0%, rgba(255,255,255,0) 70%);"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
